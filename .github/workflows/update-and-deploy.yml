name: Update Feishu Data and Deploy Pages

on:
  schedule:
    # GitHub Actions 使用 UTC 时间
    # 对应中国时间：08:00、12:00、16:00、20:00
    - cron: "0 0,4,8,12 * * *"

  # 保留手动运行按钮
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Fetch Feishu data
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_WIKI_NODE_TOKEN: ${{ secrets.FEISHU_WIKI_NODE_TOKEN }}
          FEISHU_SPREADSHEET_TOKEN: ${{ secrets.FEISHU_SPREADSHEET_TOKEN }}
          FEISHU_SHEET_RANGES: ${{ secrets.FEISHU_SHEET_RANGES }}
        run: node scripts/fetch-feishu-data.js

      - name: Check generated files
        run: |
          echo "Checking generated data files..."
          ls -lah data || true
          test -f data/fixtures.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
